<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!--
    VietCast favicon — green V on a soft rounded square.
    Matches the build/icon.ico / build/icon.png brand asset used by
    the Electron window + the NSIS installer. Kept simple so the
    browser tab (16x16 down to 32x32) still reads cleanly.

    Colour palette mirrors src/assets/icon.ico:
      primary green:  #22c55e  (V stroke)
      background:     #ffffff  (rounded square)
      halo:           #22c55e22 (~13% alpha for depth)
  -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="#ffffff"/>
  <rect x="2" y="2" width="60" height="60" rx="13" ry="13" fill="#22c55e22"/>
  <path
    d="M18 18 L32 50 L46 18"
    fill="none"
    stroke="#22c55e"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
